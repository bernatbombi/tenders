services:
  - type: web
    name: tenders-api
    runtime: python
    rootDir: apps/scraper
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
